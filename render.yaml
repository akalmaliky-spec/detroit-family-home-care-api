services:
  - type: web
    name: detroit-family-home-care-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn dfhc.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: detroit-family-home-care-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://www.detroitfamilyhomecare.com,https://detroitfamilyhomecare.com

databases:
  - name: detroit-family-home-care-db
    plan: free
