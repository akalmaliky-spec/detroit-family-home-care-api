# alembic.ini — Alembic migration configuration for DFHC API
# DATABASE_URL is read from the environment in dfhc/alembic/env.py.
# Do NOT hardcode a database URL here.

[alembic]
script_location = dfhc/alembic
prepend_sys_path = .
version_path_separator = os

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
