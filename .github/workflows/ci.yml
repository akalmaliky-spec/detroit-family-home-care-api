name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      TESTING: "true"
      SECRET_KEY: "ci-test-secret-key-not-for-production-1234567890"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with ruff
        run: ruff check dfhc/ --ignore E501,F401
      - name: Run tests
        run: python -m pytest dfhc/tests/ -v --tb=short
