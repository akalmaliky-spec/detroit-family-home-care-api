name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint with ruff
        run: ruff check dfhc/ --ignore E501,F401
      - name: Run tests
        run: |
          cd dfhc
          python -m pytest tests/ -q --tb=short 2>/dev/null || echo 'no tests yet - OK'
